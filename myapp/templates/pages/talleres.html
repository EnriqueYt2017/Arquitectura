{% extends 'layouts/base.html' %}
{% block content %}
{% load static %}
 <!-- INICIO CALENDARIO -->
  <div class="container mt-5">
    <h1 class="mb-4">Calendario de Eventos</h1>
    <div id="calendar"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-primary" id="prevMonth">Anterior</button>
        <h2 id="currentMonth"></h2>
        <button class="btn btn-primary" id="nextMonth">Siguiente</button>
    </div>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Dom</th>
                <th>Lun</th>
                <th>Mar</th>
                <th>Mié</th>
                <th>Jue</th>
                <th>Vie</th>
                <th>Sáb</th>
            </tr>
        </thead>
        <tbody id="calendarBody">
        </tbody>
    </table>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentMonthEl = document.getElementById('currentMonth');
            const calendarBody = document.getElementById('calendarBody');
            const prevMonthBtn = document.getElementById('prevMonth');
            const nextMonthBtn = document.getElementById('nextMonth');
            let currentDate = new Date();

            function renderCalendar(date) {
                const year = date.getFullYear();
                const month = date.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

                currentMonthEl.textContent = `${monthNames[month]} ${year}`;
                calendarBody.innerHTML = '';

                let row = document.createElement('tr');
                for (let i = 0; i < firstDay; i++) {
                    row.appendChild(document.createElement('td'));
                }

                for (let day = 1; day <= lastDate; day++) {
                    if (row.children.length === 7) {
                        calendarBody.appendChild(row);
                        row = document.createElement('tr');
                    }
                    const cell = document.createElement('td');
                    cell.textContent = day;
                    row.appendChild(cell);
                }

                calendarBody.appendChild(row);
            }

            prevMonthBtn.addEventListener('click', function() {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar(currentDate);
            });

            nextMonthBtn.addEventListener('click', function() {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar(currentDate);
            });

            renderCalendar(currentDate);
        });
    </script>
</div>
    <!-- FIN CALENDARIO -->
    <div class="mt-4 p-1 bg-dark text-white rounded"></div>
    <div class="container mt-5">
    <h2 class="mt-5">Inscripción en Talleres</h2>
    <form id="registrationForm">
        <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="name" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
            <label for="workshop" class="form-label">Taller</label>
            <select class="form-select" id="workshop" required>
                <option value="">Seleccione un taller</option>
                <option value="taller1">Taller 1</option>
                <option value="taller2">Taller 2</option>
                <option value="taller3">Taller 3</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Inscribirse</button>
    </form>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css" rel="stylesheet">
</div>
{% endblock %}
